name: CI

on:
  push:
  pull_request:

jobs:
  docker-test:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t geococo-web:ci .

      - name: Run container
        run: |
          docker rm -f geococo-web-ci 2>/dev/null || true
          docker run -d --name geococo-web-ci -p 18000:8000 geococo-web:ci

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18000/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs geococo-web-ci || true
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f geococo-web-ci 2>/dev/null || true

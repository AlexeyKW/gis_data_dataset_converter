name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: [self-hosted, linux]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t geococo-web:${{ github.sha }} .

      - name: Deploy staging container
        run: |
          docker rm -f geococo-web-staging 2>/dev/null || true
          docker run -d --name geococo-web-staging -p 8001:8000 geococo-web:${{ github.sha }}

      - name: Health check staging
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "Staging is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Staging health check failed"
          docker logs geococo-web-staging || true
          exit 1

      - name: Cleanup on failure
        if: failure()
        run: docker rm -f geococo-web-staging 2>/dev/null || true

  deploy-production:
    runs-on: [self-hosted, linux]
    environment: production
    needs: deploy-staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t geococo-web:${{ github.sha }} .

      - name: Deploy production container
        run: |
          docker rm -f geococo-web-production 2>/dev/null || true
          docker run -d --name geococo-web-production -p 8000:8000 geococo-web:${{ github.sha }}

      - name: Health check production
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Production is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Production health check failed"
          docker logs geococo-web-production || true
          exit 1

      - name: Cleanup on failure
        if: failure()
        run: docker rm -f geococo-web-production 2>/dev/null || true
